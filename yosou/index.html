<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>2年生期末考査予想問題 社会 回答</title>

<style>
body{
    font-family: sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1{
    text-align:center;
}

.answer-box{
    background:white;
    border-radius:10px;
    margin:15px auto;
    max-width:1000px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.title{
    padding:15px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

.content{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.4s ease;
}

.content img{
    width:100%;
    display:block;
}
</style>
</head>
<body>

<h1>2年生期末考査予想問題 社会 回答</h1>

<div class="answer-box">
    <div class="title" onclick="toggle(this)">
        ▼ 日本の地域的特色-自然環境と地理的特色-
    </div>
    <div class="content">
        <img src="answers/1.png">
    </div>
</div>

<div class="answer-box">
    <div class="title" onclick="toggle(this)">
        ▼ 日本の地域的特色-人口・産業・経済の特徴-
    </div>
    <div class="content">
        <img src="answers/2.jpg">
    </div>
</div>

<div class="answer-box">
    <div class="title" onclick="toggle(this)">
        ▼ 九州地方
    </div>
    <div class="content">
        <img src="answers/3.png">
    </div>
</div>

<div class="answer-box">
    <div class="title" onclick="toggle(this)">
        ▼ 第4回
    </div>
    <div class="content">
        <img src="answers/4.png">
    </div>
</div>

<script>
function toggle(element){

    const content = element.nextElementSibling;

    if(content.style.maxHeight){
        content.style.maxHeight = null;
        element.textContent =
            element.textContent.replace("▲","▼");
    }else{
        content.style.maxHeight =
            content.scrollHeight + "px";
        element.textContent =
            element.textContent.replace("▼","▲");
    }

}
</script>

</body>
</html>
